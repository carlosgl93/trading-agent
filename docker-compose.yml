services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    profiles:
      - ollama

  tradingagents-ollama:
    build: .
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    depends_on:
      - ollama
    tty: true
    stdin_open: true
    profiles:
      - ollama

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - tradingagents_data:/root/.tradingagents
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    command: celery -A backend.celery_app worker --loglevel=info --concurrency=2 -Q analysis,default
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - tradingagents_data:/root/.tradingagents
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    command: celery -A backend.celery_app beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  tradingagents_data:
  ollama_data:
