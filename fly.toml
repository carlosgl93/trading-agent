# fly.toml app configuration file generated for tradingagents-api on 2026-06-20T21:16:51-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tradingagents-api'
primary_region = 'iad'
kill_signal = 'SIGINT'
kill_timeout = '30s'

[build]
  dockerfile = 'Dockerfile.backend'

[env]
  ALPACA_PAPER = 'true'
  BACKEND_CORS_ORIGIN = '*'
  BACKEND_PORT = '8000'
  COOLDOWN_SECONDS = '30'
  PYTHONUNBUFFERED = '1'
  TARGET_TICKERS = 'AAPL,MSFT,GOOGL,NVDA,TSLA'

[processes]
  app = 'uvicorn backend.main:app --host 0.0.0.0 --port 8000'
  redis = "redis-server --appendonly no --save '' --maxmemory 100mb --maxmemory-policy allkeys-lru --bind 0.0.0.0 --protected-mode no"
  worker = 'celery -A backend.celery_app worker --loglevel=info --concurrency=1 -Q analysis,default --without-mingle --without-gossip --without-heartbeat'

[[services]]
  protocol = 'tcp'
  internal_port = 8000
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '20s'
    method = 'get'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
